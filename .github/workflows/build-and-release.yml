name: Build and Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    if: github.event.pull_request.merged == true
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache background-removal model
        uses: actions/cache@v4
        with:
          path: assets/models
          key: bg-removal-model-v1

      - name: Fetch background-removal model (if not cached)
        run: npm run fetch-model
        continue-on-error: true

      - name: Build (Windows portable)
        if: matrix.platform == 'win'
        run: npx electron-builder --win portable --publish never

      - name: Build (Windows APPX for Microsoft Store)
        if: matrix.platform == 'win'
        run: npx electron-builder --win appx --publish never

      - name: Build (macOS)
        if: matrix.platform == 'mac'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

      - name: Upload APPX artifact
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: build-win-appx
          path: dist/*.appx
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}-${{ github.run_number }}
          name: v${{ steps.pkg.outputs.version }} (build ${{ github.run_number }})
          body: |
            Also available on the [Microsoft Store](https://apps.microsoft.com/detail/9N6DXQQZP719).
          files: artifacts/**/*
          generate_release_notes: true

  publish-store:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APPX artifact
        uses: actions/download-artifact@v4
        with:
          name: build-win-appx
          path: appx

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install libsecret and keyring
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-0 gnome-keyring dbus

      - name: Install Microsoft Store Developer CLI
        run: |
          curl -sL https://github.com/microsoft/msstore-cli/releases/latest/download/MSStoreCLI-linux-x64.tar.gz -o msstore-cli.tar.gz
          mkdir -p msstore-cli
          tar -xvf msstore-cli.tar.gz -C ./msstore-cli
          sudo cp -R msstore-cli/. /usr/local/bin

      # msstore stores credentials via the Secret Service API, which needs a
      # D-Bus session with an unlocked gnome-keyring. That session only lives
      # for the duration of dbus-run-session, so configure and publish must
      # run inside the same one.
      - name: Configure and publish to Microsoft Store
        env:
          MSSTORE_TENANT_ID: ${{ vars.MSSTORE_TENANT_ID }}
          MSSTORE_SELLER_ID: ${{ vars.MSSTORE_SELLER_ID }}
          MSSTORE_CLIENT_ID: ${{ vars.MSSTORE_CLIENT_ID }}
          MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
        run: |
          dbus-run-session -- bash -c '
            set -e
            echo "keyring" | gnome-keyring-daemon --unlock
            msstore reconfigure \
              --tenantId "$MSSTORE_TENANT_ID" \
              --sellerId "$MSSTORE_SELLER_ID" \
              --clientId "$MSSTORE_CLIENT_ID" \
              --clientSecret "$MSSTORE_CLIENT_SECRET"
            msstore publish appx -i "$(ls appx/*.appx)" -id 9N6DXQQZP719
          '
